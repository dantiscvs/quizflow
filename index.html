<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizFlow — Jak dobrze to znasz?</title>
<style>
  :root {
    --bg: #0f0f13;
    --card: #1a1a22;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43e97b;
    --text: #f0f0f0;
    --muted: #888;
    --border: #2a2a36;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  .screen { display: none; width: 100%; max-width: 680px; }
  .screen.active { display: flex; flex-direction: column; gap: 20px; }

  .logo { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); text-align: center; font-weight: 600; margin-top: 24px; }
  h1 { font-size: clamp(22px,5vw,30px); line-height: 1.25; text-align: center; }
  .subtitle { color: var(--muted); text-align: center; font-size: 14px; line-height: 1.6; }

  .search-wrap { position: relative; }
  .search-input { width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 16px 12px 42px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; }

  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; padding: 6px 14px; cursor: pointer; color: var(--muted); font-size: 12px; font-weight: 600; transition: all .15s; white-space: nowrap; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: #6c63ff15; }

  .random-btn { background: linear-gradient(135deg, #6c63ff, #ff6584); border: none; border-radius: 12px; padding: 13px 20px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s, transform .1s; letter-spacing: .3px; }
  .random-btn:hover { opacity: .88; transform: translateY(-1px); }

  .cat-count { font-size: 12px; color: var(--muted); }

  .categories { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .cat-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 12px; cursor: pointer; transition: border-color .2s, transform .15s; text-align: center; color: var(--text); }
  .cat-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
  .cat-btn .icon { font-size: 26px; margin-bottom: 7px; }
  .cat-btn .cat-name { font-size: 12px; font-weight: 700; line-height: 1.3; }
  .cat-btn .cat-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .cat-btn .cat-group { display: inline-block; margin-top: 6px; font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); opacity: .7; }
  .cat-btn.hidden { display: none; }

  .quiz-header { display: flex; justify-content: space-between; align-items: center; }
  .quiz-cat { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

  .timer-ring { position: relative; width: 52px; height: 52px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke: var(--border); stroke-width: 3.5; }
  .timer-ring .progress { stroke: var(--accent); stroke-dasharray: 125.6; stroke-dashoffset: 0; stroke-linecap: round; transition: stroke .5s; }
  .timer-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }

  .riddle-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 24px; }
  .riddle-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
  .riddle-question { font-size: clamp(14px,3.5vw,17px); line-height: 1.55; white-space: pre-line; }
  .code-block { background: #0d0d12; border: 1px solid #2a2a3a; border-radius: 10px; padding: 14px 18px; font-family: 'Cascadia Code','Fira Code','Courier New',monospace; font-size: 13px; color: #a8d8ff; margin: 14px 0 6px; overflow-x: auto; white-space: pre; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 16px; cursor: pointer; text-align: left; color: var(--text); font-size: 14px; line-height: 1.45; transition: border-color .15s, background .15s; }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); }
  .opt-btn.correct { border-color: var(--green); background: #43e97b18; }
  .opt-btn.wrong   { border-color: var(--accent2); background: #ff658418; }
  .opt-btn:disabled { cursor: default; }
  .opt-tag { display: inline-block; width: 22px; height: 22px; border-radius: 6px; background: var(--border); text-align: center; line-height: 22px; font-size: 11px; font-weight: 700; margin-right: 10px; }

  .explanation { background: #1e2030; border-left: 3px solid var(--accent); border-radius: 0 12px 12px 0; padding: 14px 16px; font-size: 13px; line-height: 1.65; color: #ccc; display: none; }
  .explanation.show { display: block; }
  .explanation strong { color: var(--text); }

  .result-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; padding: 32px 28px; text-align: center; display: flex; flex-direction: column; gap: 16px; align-items: center; }
  .score-ring { position: relative; width: 120px; height: 120px; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring circle { fill: none; stroke-width: 8; }
  .score-ring .bg { stroke: var(--border); }
  .score-ring .fg { stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .score-num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-num .big { font-size: 34px; font-weight: 800; }
  .score-num .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .verdict { font-size: 20px; font-weight: 700; }
  .verdict-sub { color: var(--muted); font-size: 14px; line-height: 1.5; }
  .result-detail { display: flex; gap: 16px; width: 100%; }
  .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; text-align: center; flex: 1; }
  .stat .sv { font-size: 20px; font-weight: 700; }
  .stat .sl { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .action-row { display: flex; gap: 10px; width: 100%; }
  .btn { flex: 1; padding: 13px; border-radius: 12px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .15s, transform .1s; }
  .btn:hover { opacity: .88; transform: translateY(-1px); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--card); border: 1.5px solid var(--border); color: var(--text); }
  .share-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 18px; color: var(--text); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: border-color .15s; }
  .share-btn:hover { border-color: var(--accent); }

  @keyframes pop { 0%{transform:scale(.9);opacity:0} 100%{transform:scale(1);opacity:1} }
  .anim-pop { animation: pop .3s ease; }
  .no-results { color: var(--muted); text-align: center; padding: 32px 0; font-size: 14px; }

  @media(max-width:420px){
    .categories { grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); }
    .result-detail { gap: 10px; }
    .filter-btn { font-size: 11px; padding: 5px 10px; }
  }
</style>
</head>
<body>

<div id="screen-home" class="screen active">
  <div class="logo">⚡ QuizFlow</div>
  <div>
    <h1>Jak dobrze to znasz?</h1>
    <p class="subtitle" style="margin-top:8px">Jedna zagadka. Licznik startuje. Im szybciej — tym lepiej.</p>
  </div>
  <button class="random-btn" onclick="startRandom()">🎲 Losowa zagadka</button>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="Szukaj kategorii..." oninput="filterCategories()">
  </div>
  <div class="filter-row" id="filter-row"></div>
  <div><span class="cat-count" id="cat-count"></span></div>
  <div class="categories" id="categories-grid"></div>
</div>

<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <span class="quiz-cat" id="quiz-cat-label"></span>
    <div class="timer-ring">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="20"></circle>
        <circle class="progress" id="timer-circle" cx="26" cy="26" r="20"></circle>
      </svg>
      <div class="timer-text" id="timer-text">0</div>
    </div>
  </div>
  <div class="riddle-card anim-pop">
    <div class="riddle-label">Zagadka</div>
    <div class="riddle-question" id="riddle-question"></div>
    <div class="code-block" id="riddle-code" style="display:none"></div>
  </div>
  <div class="options" id="options-list"></div>
  <div class="explanation" id="explanation"></div>
</div>

<div id="screen-result" class="screen">
  <div class="result-card anim-pop">
    <div class="score-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="bg" cx="60" cy="60" r="50"></circle>
        <circle class="fg" id="score-arc" cx="60" cy="60" r="50" stroke-dasharray="314.16" stroke-dashoffset="314.16"></circle>
      </svg>
      <div class="score-num">
        <div class="big" id="score-display">0</div>
        <div class="lbl">punktow</div>
      </div>
    </div>
    <div class="verdict" id="verdict-text"></div>
    <div class="verdict-sub" id="verdict-sub"></div>
    <div class="result-detail">
      <div class="stat"><div class="sv" id="res-time">0s</div><div class="sl">sekund</div></div>
      <div class="stat"><div class="sv" id="res-correct">-</div><div class="sl">odpowiedz</div></div>
    </div>
    <div class="action-row">
      <button class="btn btn-ghost" onclick="backHome()">Kategorie</button>
      <button class="btn btn-primary" onclick="retryQuiz()">Sprobuj jeszcze raz</button>
    </div>
    <div class="action-row" style="margin-top:-6px">
      <button class="btn btn-ghost" onclick="startRandom()" style="flex:1">Losowa zagadka</button>
    </div>
    <button class="share-btn" onclick="shareResult()"><span>Link</span> Skopiuj wynik</button>
  </div>
</div>

<script>
const GROUPS = {
  tech:   'Tech',
  sheets: 'Arkusze',
  mkt:    'Marketing',
  hr:     'HR',
  biz:    'Biznes',
  design: 'Design',
  data:   'Dane & AI',
  prod:   'Produktywnosc',
  soft:   'Soft skills',
};

const RIDDLES = {
  python: {
    icon:'P', name:'Python', sub:'Jednolinijkowce', group:'tech',
    label:'Python',
    question:'Co zwroci ten kod?',
    code:'words = ["data", "is", "power"]\nprint(" ".join(reversed(words)))',
    options:[
      {text:'"power is data"',correct:true},
      {text:'"data is power"',correct:false},
      {text:'"rewop si atad"',correct:false},
      {text:'TypeError — reversed() nie dziala na listach',correct:false},
    ],
    explanation:'<strong>reversed(words)</strong> zwraca iterator od konca listy. <strong>" ".join(...)</strong> scala elementy spacją. Wynik: "power is data". reversed() działa na listach, tuple i każdej sekwencji.',
  },
  sql: {
    icon:'S', name:'SQL', sub:'Zapytania', group:'tech',
    label:'SQL',
    question:'Jakie wiersze zwroci to zapytanie?',
    code:'SELECT name, salary\nFROM employees\nWHERE salary > (\n  SELECT AVG(salary) FROM employees\n);',
    options:[
      {text:'Pracownicy zarabiajacy powyzej sredniej w firmie',correct:true},
      {text:'Pracownicy z maksymalnym wynagrodzeniem',correct:false},
      {text:'Wszyscy pracownicy posortowani po salary',correct:false},
      {text:'Pracownicy z salary rownym sredniej',correct:false},
    ],
    explanation:'Podzapytanie <strong>SELECT AVG(salary)</strong> oblicza jedną wartość — sredniąą firmy. Zewnętrzne zapytanie filtruje tylko tych, którzy zarabiają powyzej niej.',
  },
  js: {
    icon:'J', name:'JavaScript', sub:'ES6+ pulapki', group:'tech',
    label:'JavaScript',
    question:'Co wyswietli ten kod?',
    code:'console.log(typeof null)',
    options:[
      {text:'"object"',correct:true},
      {text:'"null"',correct:false},
      {text:'"undefined"',correct:false},
      {text:'"boolean"',correct:false},
    ],
    explanation:'<strong>typeof null === "object"</strong> to slynny bug JavaScript z 1995 roku, który nigdy nie zostal naprawiony ze wzgledu na kompatybilnosc wsteczna. Zawsze sprawdzaj przez <strong>=== null</strong>.',
  },
  ts: {
    icon:'T', name:'TypeScript', sub:'Typy i generyki', group:'tech',
    label:'TypeScript',
    question:'Jaki bedzie typ zmiennej Keys?',
    code:'type Keys = keyof { name: string; age: number; active: boolean }',
    options:[
      {text:'"name" | "age" | "active"',correct:true},
      {text:'string',correct:false},
      {text:'{ name: string; age: number; active: boolean }',correct:false},
      {text:'never',correct:false},
    ],
    explanation:'<strong>keyof</strong> pobiera union type ze wszystkich kluczy obiektu. Dla { name, age, active } wynik to literal type <strong>"name" | "age" | "active"</strong>. To podstawa type-safe code w TypeScript.',
  },
  react: {
    icon:'R', name:'React', sub:'Hooki', group:'tech',
    label:'React',
    question:'Kiedy uruchomi sie ten useEffect?',
    code:'useEffect(() => {\n  fetchData();\n}, []);',
    options:[
      {text:'Dokladnie raz, po pierwszym renderze komponentu',correct:true},
      {text:'Po kazdym rerenderze komponentu',correct:false},
      {text:'Nigdy — pusta tablica wylacza efekt',correct:false},
      {text:'Przed pierwszym renderem (synchronicznie)',correct:false},
    ],
    explanation:'<strong>useEffect z []</strong> odpowiada componentDidMount — uruchamia sie raz po zamontowaniu. Bez tablicy = po kazdym renderze. Z wartosciami w tablicy = gdy te wartosci sie zmienia.',
  },
  git: {
    icon:'G', name:'Git', sub:'Komendy', group:'tech',
    label:'Git',
    question:'Co robi ta komenda?',
    code:'git stash pop',
    options:[
      {text:'Przywraca ostatnie zmiany ze stosu stash i usuwa je stamtad',correct:true},
      {text:'Trwale usuwa wszystkie zapisane stashe',correct:false},
      {text:'Tworzy nowy branch ze stasha',correct:false},
      {text:'Wyswietla liste wszystkich stashy',correct:false},
    ],
    explanation:'<strong>git stash pop</strong> = git stash apply + git stash drop. Przywraca zmiany z wierzcholka stosu i usuwa je. Alternatywa: <strong>git stash apply</strong> przywraca ale zostawia w stosie.',
  },
  regex: {
    icon:'/', name:'Regex', sub:'Wzorce', group:'tech',
    label:'Wyrazenia regularne',
    question:'Co pasuje do wzorca?',
    code:'^\\d{2}-\\d{3}$',
    options:[
      {text:'Polski kod pocztowy np. 00-001',correct:true},
      {text:'Adres email',correct:false},
      {text:'Numer telefonu w formacie +48 xxx',correct:false},
      {text:'Data w formacie DD-MM-YYYY',correct:false},
    ],
    explanation:'<strong>^</strong> i <strong>$</strong> zakotwiczaja do poczatku/konca. <strong>\\d{2}</strong> = dokladnie 2 cyfry, <strong>-</strong> = myslnik, <strong>\\d{3}</strong> = 3 cyfry. Razem pasuje tylko format xx-xxx jak kody pocztowe.',
  },
  bash: {
    icon:'$', name:'Bash / Linux', sub:'Terminal', group:'tech',
    label:'Bash / Linux',
    question:'Co robi ta komenda?',
    code:'grep -r "TODO" . --include="*.js"',
    options:[
      {text:'Rekurencyjnie szuka "TODO" we wszystkich plikach .js',correct:true},
      {text:'Usuwa wszystkie komentarze TODO z plikow JS',correct:false},
      {text:'Liczy wystapienia TODO w katalogu',correct:false},
      {text:'Zamienia TODO na DONE w plikach JS',correct:false},
    ],
    explanation:'<strong>grep -r</strong> = rekurencyjnie. <strong>"TODO"</strong> = szukany wzorzec. <strong>.</strong> = biezacy katalog. <strong>--include="*.js"</strong> = tylko pliki JS. Wynik: lista plikow i linii z TODO.',
  },
  docker: {
    icon:'D', name:'Docker', sub:'Kontenery', group:'tech',
    label:'Docker',
    question:'Co robi ta instrukcja w Dockerfile?',
    code:'COPY . .',
    options:[
      {text:'Kopiuje wszystkie pliki z hosta do biezacego katalogu w kontenerze',correct:true},
      {text:'Duplikuje warstwe obrazu dla cache',correct:false},
      {text:'Synchronizuje zmiany z wolumenu',correct:false},
      {text:'Blad — COPY wymaga podania konkretnej sciezki',correct:false},
    ],
    explanation:'<strong>COPY [src] [dest]</strong>: pierwszy <strong>.</strong> to katalog kontekstu budowania (host), drugi <strong>.</strong> to WORKDIR w kontenerze. Uzywaj <strong>.dockerignore</strong> by wykluczyc node_modules i .git.',
  },
  css: {
    icon:'C', name:'CSS', sub:'Layout & selektory', group:'tech',
    label:'CSS',
    question:'Co robi ta deklaracja?',
    code:'display: flex;\njustify-content: space-between;',
    options:[
      {text:'Elementy na obu koncach, reszta rowniomiernie rozlozona',correct:true},
      {text:'Wszystkie elementy wysrodkowane',correct:false},
      {text:'Elementy skupione po lewej z rownymi odstepami',correct:false},
      {text:'Elementy rozciagniete na pelna szerokosc',correct:false},
    ],
    explanation:'<strong>space-between</strong>: pierwszy element przy lewej krawedzi, ostatni przy prawej, reszta rownomiernie miedzy nimi. Inne wartosci: center, flex-start, flex-end, space-around.',
  },
  http: {
    icon:'H', name:'HTTP', sub:'Statusy & protokol', group:'tech',
    label:'HTTP',
    question:'Co oznacza status HTTP 429?',
    options:[
      {text:'Too Many Requests — przekroczono limit zadan (rate limiting)',correct:true},
      {text:'Payment Required — wymagana platnosc',correct:false},
      {text:'Request Timeout — zadanie trwalo za dlugo',correct:false},
      {text:'Unauthorized — brak autoryzacji',correct:false},
    ],
    explanation:'<strong>429 Too Many Requests</strong> to odpowiedz rate limitingu. Serwer moze zwrocic naglowek <strong>Retry-After</strong> z czasem oczekiwania. Zawsze obsluguj 429 z exponential backoff.',
  },
  algorithms: {
    icon:'A', name:'Algorytmy', sub:'Zlozonosc', group:'tech',
    label:'Algorytmy',
    question:'Jaka jest zlozonosc czasowa wyszukiwania binarnego?',
    options:[
      {text:'O(log n)',correct:true},
      {text:'O(n)',correct:false},
      {text:'O(n squared)',correct:false},
      {text:'O(1)',correct:false},
    ],
    explanation:'Wyszukiwanie binarne za kazdym krokiem <strong>dzieli przestrzen poszukiwan na pol</strong> — stad O(log n). Wymaga posortowanej tablicy. Dla 1 mln elementow: max ~20 porownań zamiast 1 000 000.',
  },
  graphql: {
    icon:'Q', name:'GraphQL', sub:'API', group:'tech',
    label:'GraphQL',
    question:'Czym rozni sie Query od Mutation w GraphQL?',
    options:[
      {text:'Query = odczyt danych, Mutation = modyfikacja danych',correct:true},
      {text:'Query jest synchroniczne, Mutation asynchroniczne',correct:false},
      {text:'Query zwraca jeden obiekt, Mutation liste',correct:false},
      {text:'Nie ma roznicy — to tylko konwencja nazewnicza',correct:false},
    ],
    explanation:'<strong>Query</strong> sluzy do pobierania danych (odpowiednik GET). <strong>Mutation</strong> do tworzenia, aktualizacji i usuwania (POST/PUT/DELETE). Queries moga byc wykonywane rownolegle, Mutations sa serializowane.',
  },
  vscode: {
    icon:'V', name:'VS Code', sub:'Skroty', group:'tech',
    label:'VS Code',
    question:'Co robi skrot Ctrl+Shift+P?',
    options:[
      {text:'Otwiera Command Palette — wyszukiwarke wszystkich komend',correct:true},
      {text:'Formatuje kod w aktywnym pliku',correct:false},
      {text:'Otwiera terminal zintegrowany',correct:false},
      {text:'Zamyka aktywny panel',correct:false},
    ],
    explanation:'<strong>Command Palette</strong> to serce VS Code. Mozesz stad uruchamiac dowolna komende bez znajomosci skrotu. Wpisz > by szukac komend, @ by przejsc do symbolu, : by przejsc do linii.',
  },
  nodejs: {
    icon:'N', name:'Node.js', sub:'Runtime', group:'tech',
    label:'Node.js',
    question:'Co robi process.nextTick(callback)?',
    options:[
      {text:'Wykonuje callback na koncu biezacej fazy event loop, przed I/O',correct:true},
      {text:'Opoznia callback o jedna sekunde',correct:false},
      {text:'Wykonuje callback w nowym watku',correct:false},
      {text:'Planuje callback jak setTimeout(fn, 0)',correct:false},
    ],
    explanation:'<strong>process.nextTick</strong> jest szybszy niz setTimeout(0) — uruchamia sie przed nastepna iteracja event loop. Uzywaj ostrozonie — zbyt duzo wywolan moze zablokowac I/O.',
  },
  sheets: {
    icon:'S', name:'Google Sheets', sub:'Formuly', group:'sheets',
    label:'Google Sheets',
    question:'Co robi ta formula?\n\nWklej w B2 obok tekstu w A2.',
    code:'=IF(A2="","",COUNTA(SPLIT(A2," ")))',
    options:[
      {text:'Liczy slowa w komorce A2',correct:true},

let currentCat = null;
let timerInterval = null;
let elapsed = 0;
let answered = false;
let activeFilter = 'all';
const MAX_SECONDS = 60;

function init() {
  buildFilterRow();
  buildGrid();
  updateCount();
}

function buildFilterRow() {
  const row = document.getElementById('filter-row');
  row.innerHTML = '<button class="filter-btn active" data-group="all" onclick="setFilter(\'all\')">Wszystkie</button>';
  Object.entries(GROUPS).forEach(([key, label]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.group = key;
    btn.textContent = label;
    btn.onclick = () => setFilter(key);
    row.appendChild(btn);
  });
}

function buildGrid() {
  const grid = document.getElementById('categories-grid');
  grid.innerHTML = '';
  Object.entries(RIDDLES).forEach(([key, r]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.key = key;
    btn.dataset.group = r.group;
    btn.dataset.name = (r.name + ' ' + r.sub + ' ' + key).toLowerCase();
    btn.innerHTML = `
      <div class="icon">${r.icon}</div>
      <div class="cat-name">${r.name}</div>
      <div class="cat-sub">${r.sub}</div>
      <div class="cat-group">${GROUPS[r.group]}</div>`;
    btn.onclick = () => startQuiz(key);
    grid.appendChild(btn);
  });
}

function setFilter(group) {
  activeFilter = group;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.group === group));
  filterCategories();
}

function filterCategories() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let visible = 0;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    const matchGroup = activeFilter === 'all' || btn.dataset.group === activeFilter;
    const matchSearch = !q || btn.dataset.name.includes(q);
    const show = matchGroup && matchSearch;
    btn.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  updateCount(visible);
  const old = document.getElementById('no-results');
  if (old) old.remove();
  if (visible === 0) {
    const el = document.createElement('div');
    el.id = 'no-results';
    el.className = 'no-results';
    el.textContent = 'Brak kategorii dla tego wyszukiwania';
    document.getElementById('categories-grid').after(el);
  }
}

function updateCount(n) {
  const count = n !== undefined ? n : Object.keys(RIDDLES).length;
  document.getElementById('cat-count').textContent = count + ' kategorii';
}

function startRandom() {
  const keys = Object.keys(RIDDLES);
  startQuiz(keys[Math.floor(Math.random() * keys.length)]);
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz(cat) {
  currentCat = cat;
  answered = false;
  elapsed = 0;
  const r = RIDDLES[cat];
  document.getElementById('quiz-cat-label').textContent = r.label;
  document.getElementById('riddle-question').textContent = r.question;
  const codeEl = document.getElementById('riddle-code');
  if (r.code) { codeEl.textContent = r.code; codeEl.style.display = 'block'; }
  else { codeEl.style.display = 'none'; }
  const opts = [...r.options].sort(() => Math.random() - .5);
  const tags = ['A','B','C','D'];
  const list = document.getElementById('options-list');
  list.innerHTML = '';
  opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = '<span class="opt-tag">' + tags[i] + '</span>' + o.text;
    btn.onclick = () => pick(btn, o.correct, r.explanation);
    list.appendChild(btn);
  });
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('explanation').innerHTML = '';
  show('screen-quiz');
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  elapsed = 0;
  updateTimerUI(0);
  timerInterval = setInterval(() => {
    elapsed++;
    updateTimerUI(elapsed);
    if (elapsed >= MAX_SECONDS && !answered) {
      clearInterval(timerInterval);
      showResult(false);
    }
  }, 1000);
}

function updateTimerUI(secs) {
  document.getElementById('timer-text').textContent = secs;
  const circle = document.getElementById('timer-circle');
  const pct = Math.min(secs / MAX_SECONDS, 1);
  circle.style.strokeDashoffset = 125.6 * pct;
  circle.style.stroke = pct < .4 ? '#6c63ff' : pct < .7 ? '#f5a623' : '#ff6584';
}

function pick(btn, correct, explanation) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  document.querySelectorAll('.opt-btn').forEach(b => { b.disabled = true; });
  btn.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    const correctText = RIDDLES[currentCat].options.find(o => o.correct).text;
    document.querySelectorAll('.opt-btn').forEach(b => {
      if (b.textContent.includes(correctText)) b.classList.add('correct');
    });
  }
  const expEl = document.getElementById('explanation');
  expEl.innerHTML = explanation;
  expEl.classList.add('show');
  setTimeout(() => showResult(correct), 1600);
}

function calcScore(secs, correct) {
  if (!correct) return 0;
  return Math.max(10, Math.round(100 - (secs / MAX_SECONDS) * 90));
}

function showResult(correct) {
  const score = calcScore(elapsed, correct);
  document.getElementById('score-display').textContent = score;
  const arc = document.getElementById('score-arc');
  arc.style.stroke = correct ? (score >= 70 ? '#43e97b' : '#f5a623') : '#ff6584';
  setTimeout(() => { arc.style.strokeDashoffset = 314.16 * (1 - score / 100); }, 100);
  document.getElementById('res-time').textContent = elapsed + 's';
  document.getElementById('res-correct').textContent = correct ? 'Dobra' : 'Bledna';
  let v, vs;
  if (!correct)       { v = 'Nie tym razem';          vs = 'Sprawdz wyjasnienie i sprobuj ponownie.'; }
  else if (score>=90) { v = 'Blyskawica!';             vs = 'Odpowiedziales w rekordowym czasie. Mistrz.'; }
  else if (score>=70) { v = 'Szybko!';                 vs = 'Bardzo dobry wynik. Znasz sie na rzeczy.'; }
  else if (score>=50) { v = 'Niezle';                  vs = 'Dobra odpowiedz, ale nastepnym razem szybciej!'; }
  else                { v = 'Powoli ale skutecznie';   vs = 'Poprawna odpowiedz — im szybciej, tym wyzszy wynik.'; }
  document.getElementById('verdict-text').textContent = v;
  document.getElementById('verdict-sub').textContent = vs;
  show('screen-result');
}

function backHome() { clearInterval(timerInterval); show('screen-home'); }
function retryQuiz() { startQuiz(currentCat); }

function shareResult() {
  const score = document.getElementById('score-display').textContent;
  const cat = RIDDLES[currentCat] ? RIDDLES[currentCat].label : '';
  const text = 'Zdobylem ' + score + ' punktow w kategorii ' + cat + ' na QuizFlow! Pobij moj wynik!';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.share-btn');
      btn.innerHTML = '<span>OK</span> Skopiowano!';
      setTimeout(() => { btn.innerHTML = '<span>Link</span> Skopiuj wynik'; }, 2000);
    }).catch(() => alert(text));
  } else { alert(text); }
}

init();
